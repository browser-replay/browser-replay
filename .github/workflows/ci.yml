name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUPPETEER_HEADLESS: 'true'
  PUPPETEER_DOWNLOAD_BASE_URL: 'https://storage.googleapis.com/chrome-for-testing-public'
  PUPPETEER_CACHE_DIR: '${{ github.workspace }}/.cache/puppeteer'
  TURBO_CACHE_DIR: .turbo

jobs:
  # Fast feedback jobs - run in parallel
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (all packages)
        run: NODE_OPTIONS='--max-old-space-size=4096' pnpm build:all

      - name: Bundle Size Report
        # Non-blocking for now while we establish baselines after the snapshot boundary work.
        run: pnpm size
        continue-on-error: true

  # Test jobs depend on build
  test-light:
    name: Test (Unit + Light packages)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test (Unit + Light packages)
        # Higher parallelism + basic retry for faster, more resilient runs
        run: xvfb-run --server-args="-screen 0 1920x1080x24" pnpm turbo run test --concurrency=6 --filter=!@dom-replay/core --filter=!@dom-replay/video -- --retry=1

  test-video:
    name: Test (Video package)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm --filter @dom-replay/video exec playwright install chromium

      - name: Test (Video package)
        run: xvfb-run --server-args="-screen 0 1920x1080x24" pnpm --filter @dom-replay/video test -- --retry=1

  # Core integration tests - sharded for speed and reliability
  core-integration:
    name: Core Integration Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]   # Increase this array (e.g. [1,2,3,4]) as the test suite grows
    permissions:
      contents: read
    env:
      PUPPETEER_HEADLESS: 'true'
      PUPPETEER_DOWNLOAD_BASE_URL: 'https://storage.googleapis.com/chrome-for-testing-public'
      PUPPETEER_CACHE_DIR: '${{ github.workspace }}/.cache/puppeteer'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Puppeteer Chrome
        run: pnpm --filter @dom-replay/core exec puppeteer browsers install chrome

      - name: Test (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: |
          xvfb-run --server-args="-screen 0 1920x1080x24" \
          pnpm --filter @dom-replay/core exec vitest run \
            --pool=forks --maxWorkers=2 \
            --shard=${{ matrix.shard }}/${{ strategy.job-total }} \
            --retry=2 --bail=3
